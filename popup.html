<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bricks Check</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>Bricks Check</h1>
          <p id="statusText">Chargement...</p>
        </div>
        <div class="header-actions">
          <label class="switch" title="Activer la surveillance" aria-label="Activer la surveillance">
            <input id="enabled" type="checkbox">
            <span></span>
          </label>
          <button id="openOptionsButton" class="icon-button" type="button" title="Ouvrir les réglages" aria-label="Ouvrir les réglages">
            <span aria-hidden="true">&#9881;</span>
          </button>
        </div>
      </header>

      <section class="section">
        <p id="nextCheckText" class="countdown">Prochaine vérification: --</p>
        <p id="lastCheckText" class="muted"></p>
        <div id="availableProjects" class="projects" hidden></div>
      </section>

      <p class="disclaimer">
        Extension indépendante de Bricks.co. Ne constitue pas un conseil en investissement.
      </p>

      <a
        class="support-link"
        href="https://ko-fi.com/tmontesup"
        target="_blank"
        rel="noopener noreferrer"
      >
        Offrir un café
      </a>
    </main>
    <script src="popup.js" type="module"></script>
  </body>
</html>
